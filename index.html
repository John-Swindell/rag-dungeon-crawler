<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Narrative Engine</title>
    <style>
        body { background-color: #1e1e1e; color: #00ff00; font-family: monospace; padding: 20px; }
        #game-terminal { border: 1px solid #00ff00; padding: 15px; height: 400px; overflow-y: scroll; margin-bottom: 10px; }
        input { background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 5px; width: 80%; font-family: monospace; }
        button { background: #00ff00; color: #000; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold; }
        #character-select { margin-bottom: 10px; }
        #character-select button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 10px 15px;
            margin-bottom: 5px;
            background: #000;
            color: #00ff00;
            border: 1px solid #00ff00;
            font-family: monospace;
            font-size: 14px;
            cursor: pointer;
        }
        #character-select button:hover { background: #003300; }
    </style>
</head>
<body>

    <h1>RAG Narrative Engine terminal_</h1>

    <div id="game-terminal">
        <p>Initializing connection to server...</p>
        <p>Select your character:</p>
    </div>

    <div id="character-select">
        <button onclick="startNewGame('Weasel')">Weasel - Albert Arlington, the one who built the plane</button>
        <button onclick="startNewGame('Sal')">Sal - Salvatore DeLuca, the mob boss</button>
        <button onclick="startNewGame('Billy')">Billy - Billy Handsome, the enforcer</button>
        <button onclick="startNewGame('Finn')">Finn - Michael O'Leary, the con man</button>
    </div>

    <div id="input-area" style="display: none;">
        <input type="text" id="command-input" placeholder="Enter command (e.g., 'go east', 'pickup')" autocomplete="off">
        <button onclick="sendCommand()">Execute</button>
    </div>

    <script>
        const API_BASE_URL = "http://localhost:8000/game";
        let currentSessionId = null;

        const terminal = document.getElementById("game-terminal");
        const characterSelect = document.getElementById("character-select");
        const inputArea = document.getElementById("input-area");
        const commandInput = document.getElementById("command-input");

        function printToTerminal(text, isError = false) {
            const p = document.createElement("p");
            p.innerText = text;
            if (isError) p.style.color = "red";
            terminal.appendChild(p);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function startNewGame(character) {
            characterSelect.style.display = "none";
            try {
                const response = await fetch(`${API_BASE_URL}/new`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ character: character })
                });
                if (!response.ok) throw new Error("Failed to connect to API");

                const data = await response.json();
                currentSessionId = data.session_id;

                printToTerminal(`Connection established. Session ID: ${currentSessionId}`);
                printToTerminal(`\n=== ALCATRAZ - ESCAPE FROM THE ISLAND ===`);
                printToTerminal(data.message);
                printToTerminal(`You are in the ${data.current_room}.`);
                printToTerminal(`Available exits: ${data.available_directions.join(", ")}`);

                inputArea.style.display = "block";
                commandInput.focus();
            } catch (error) {
                printToTerminal("Error: Could not connect to the game server. Is it running?", true);
                characterSelect.style.display = "block";
            }
        }

        async function sendCommand() {
            const cmd = commandInput.value.trim().toLowerCase();
            commandInput.value = "";
            if (!cmd || !currentSessionId) return;

            printToTerminal(`\n> ${cmd}`);

            try {
                if (cmd.startsWith("go ")) {
                    const direction = cmd.substring(3).trim();
                    await fetchMove(direction);
                } else if (cmd === "pickup") {
                    await fetchPickup();
                } else {
                    printToTerminal("Unknown command. Try 'go [direction]' or 'pickup'.", true);
                }
            } catch (error) {
                printToTerminal("Network error occurred.", true);
            }
        }

        async function fetchMove(direction) {
            const response = await fetch(`${API_BASE_URL}/${currentSessionId}/move`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ direction: direction })
            });
            const data = await response.json();
            handleApiResponse(data);
        }

        async function fetchPickup() {
            const response = await fetch(`${API_BASE_URL}/${currentSessionId}/pickup`, {
                method: "POST"
            });
            const data = await response.json();
            handleApiResponse(data);
        }

        function handleApiResponse(data) {
            printToTerminal(data.message);
            if (data.status === "playing") {
                printToTerminal(`You are in the ${data.current_room}.`);
                if (data.room_item) printToTerminal(`You see a ${data.room_item} here.`);
                printToTerminal(`Exits: ${data.available_directions.join(", ")}`);
                printToTerminal(`Inventory: [${data.inventory.join(", ")}]`);
            } else {
                printToTerminal(`\n*** GAME OVER: Status [${data.status.toUpperCase()}] ***`);
                inputArea.style.display = "none";
            }
        }

        commandInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") sendCommand();
        });
    </script>
</body>
</html>
