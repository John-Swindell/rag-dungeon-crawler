<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project in Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        
        /* Subtle pulse animation for the icon */
        @keyframes gentlePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.95); }
        }
        
        .animate-gentle-pulse {
            animation: gentlePulse 3s infinite ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4 selection:bg-blue-100 selection:text-blue-900">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl shadow-slate-200/40 border border-slate-100 p-8 sm:p-10 text-center transform transition-all hover:-translate-y-1 hover:shadow-2xl hover:shadow-slate-200/50 duration-300">
        
        <!-- Icon Container -->
        <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner animate-gentle-pulse border border-blue-100/50">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
        </div>
        
        <!-- Text Content -->
        <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 mb-3 tracking-tight">
            Work in Progress
        </h1>
        
        <p class="text-slate-500 mb-8 leading-relaxed text-sm sm:text-base">
            This site is currently a placeholder while the actual project is being built behind the scenes. Something awesome is coming soon.
        </p>
        
        <!-- CTA Button -->
        <a href="https://jswindell.dev" 
           target="_blank" 
           rel="noopener noreferrer" 
           class="group inline-flex items-center justify-center w-full gap-2.5 px-6 py-4 bg-slate-900 text-white font-medium rounded-xl hover:bg-blue-600 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-blue-100 active:scale-[0.98] shadow-md">
            <span>In the meantime...<br> Check out my portfolio 👉</span>
            
            <!-- External Link Arrow -->
            <svg class="w-4 h-4 transform group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
            </svg>
        </a>
        
    </div>

</body>
</html>
